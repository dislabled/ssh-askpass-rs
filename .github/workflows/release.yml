name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i '' "s|^version = \"[^\"]*\"|version = \"${VERSION}\"|" Cargo.toml

      - name: Add targets
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - name: Build (Apple Silicon)
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build (Intel)
        run: cargo build --release --target x86_64-apple-darwin

      - name: Create universal binary
        run: |
          lipo -create \
            target/aarch64-apple-darwin/release/ssh-askpass-rs \
            target/x86_64-apple-darwin/release/ssh-askpass-rs \
            -output ssh-askpass-rs

      - name: Create tarball
        run: |
          cp contrib/com.github.dislabled.ssh-askpass-rs.plist .
          tar -czf ssh-askpass-rs-macos.tar.gz ssh-askpass-rs com.github.dislabled.ssh-askpass-rs.plist

      - name: Update Homebrew formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA256=$(shasum -a 256 ssh-askpass-rs-macos.tar.gz | awk '{print $1}')
          sed -i '' "s|releases/download/v[^/]*/|releases/download/${GITHUB_REF_NAME}/|" Formula/ssh-askpass-rs.rb
          sed -i '' "s|  version \"[^\"]*\"|  version \"${VERSION}\"|" Formula/ssh-askpass-rs.rb
          sed -i '' "s|  sha256 \"[^\"]*\"|  sha256 \"${SHA256}\"|" Formula/ssh-askpass-rs.rb

      - name: Commit updated formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ssh-askpass-rs.rb Cargo.toml Cargo.lock
          git diff --cached --quiet || git commit -m "Update formula for ${GITHUB_REF_NAME}"
          git push origin HEAD:main

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: ssh-askpass-rs-macos.tar.gz
          generate_release_notes: true
